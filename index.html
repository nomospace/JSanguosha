<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>三国杀 Mini</title>
  <style>
    :root {
      --bg-dark: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-panel: #16213e;
      --primary: #f39c12;
      --danger: #e74c3c;
      --success: #2ecc71;
      --wei: #3498db;
      --shu: #2ecc71;
      --wu: #e74c3c;
      --qun: #f39c12;
      --text: #ecf0f1;
      --text-muted: #95a5a6;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 100vw;
    }
    
    /* 顶部栏 */
    .header {
      background: linear-gradient(180deg, var(--bg-panel) 0%, transparent 100%);
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(243, 156, 18, 0.2);
    }
    
    .header h1 {
      font-size: 18px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .header-info {
      display: flex;
      gap: 12px;
      font-size: 12px;
    }
    
    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 11px;
    }
    
    .status-waiting { background: var(--success); }
    .status-playing { background: var(--success); }
    .status-paused { background: var(--primary); }
    .status-ended { background: var(--danger); }
    
    /* 主区域 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
    }
    
    /* 玩家区域 */
    .players-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .player-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 10px;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    
    .player-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
    }
    
    .player-card.dead {
      opacity: 0.5;
      filter: grayscale(80%);
    }
    
    .player-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    
    .player-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    
    .player-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-panel);
    }
    
    .player-kingdom {
      position: absolute;
      bottom: -2px;
      right: -2px;
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
    }
    
    .player-info {
      flex: 1;
      min-width: 0;
    }
    
    .player-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .kingdom-wei { color: var(--wei); }
    .kingdom-shu { color: var(--shu); }
    .kingdom-wu { color: var(--wu); }
    .kingdom-qun { color: var(--qun); }
    
    .player-skill-name {
      font-size: 10px;
      color: var(--primary);
      opacity: 0.8;
    }
    
    .player-hp {
      margin: 6px 0;
    }
    
    .hp-display {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
    }
    
    .hp-heart {
      font-size: 14px;
      line-height: 1;
    }
    
    .player-equip {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .eq-item {
      margin-right: 4px;
    }
    
    .player-hand-info {
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .hand-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 6px;
    }
    
    .mini-card {
      width: 32px;
      height: 44px;
      border-radius: 4px;
      background: var(--card-color, var(--danger));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    
    .mini-card-suit {
      font-size: 14px;
      color: #fff;
      line-height: 1;
    }
    
    .mini-card-name {
      font-size: 8px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%;
      padding: 0 2px;
    }
    
    /* 控制面板 */
    .control-panel {
      background: var(--bg-panel);
      border-radius: 12px;
      padding: 10px;
      flex-shrink: 0;
    }
    
    .control-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .btn {
      flex: 1;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    .btn:active {
      transform: scale(0.95);
    }
    
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    
    .btn-secondary {
      background: #e67e22;
      color: #fff;
    }
    
    .btn-danger {
      background: var(--text-muted);
      color: #fff;
    }
    
    .deck-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }
    
    /* 日志区域 */
    .log-panel {
      background: var(--bg-card);
      border-radius: 12px;
      flex-shrink: 0;
      height: 120px;
      display: flex;
      flex-direction: column;
    }
    
    .log-header {
      padding: 6px 10px;
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .log-content {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      font-size: 11px;
      -webkit-overflow-scrolling: touch;
    }
    
    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      line-height: 1.4;
    }
    
    .log-system { color: var(--primary); }
    .log-turn { color: var(--danger); }
    .log-phase { color: var(--wei); }
    .log-draw { color: var(--success); }
    .log-play { color: #9b59b6; }
    .log-skill { color: #e67e22; }
    .log-heal { color: var(--success); }
    .log-death { color: var(--text-muted); }
    
    /* 卡牌提示 */
    .card-tooltip {
      position: fixed;
      background: var(--bg-dark);
      border: 2px solid var(--primary);
      border-radius: 12px;
      padding: 12px;
      max-width: 240px;
      z-index: 1000;
      pointer-events: none;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    .card-tooltip.show {
      display: block;
    }
    
    .card-tooltip-image {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: var(--bg-card);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .card-tooltip-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .card-tooltip-suit {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    
    .card-tooltip-desc {
      font-size: 11px;
      line-height: 1.5;
    }
    
    /* 底部信息 */
    .footer {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    
    /* 响应式 - 平板 */
    @media (min-width: 600px) {
      .players-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .player-card {
        padding: 12px;
      }
      
      .player-avatar {
        width: 44px;
        height: 44px;
      }
      
      .mini-card {
        width: 36px;
        height: 50px;
      }
      
      .log-panel {
        height: 150px;
      }
    }
    
    /* 响应式 - 桌面 */
    @media (min-width: 900px) {
      .app {
        max-width: 1000px;
        margin: 0 auto;
      }
      
      .main {
        flex-direction: row;
        padding: 12px;
        gap: 12px;
      }
      
      .players-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      
      .players-grid {
        flex: 1;
        grid-template-columns: repeat(2, 1fr);
      }
      
      .side-panel {
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      
      .log-panel {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 顶部栏 -->
    <header class="header">
      <h1>🦞 三国杀 Mini</h1>
      <div class="header-info">
        <span id="turn-display">准备开始</span>
        <span class="status-badge status-waiting" id="game-status">等待开始</span>
        <span id="deck-count">牌堆:0</span>
        <span id="discard-count">弃牌:0</span>
      </div>
    </header>
    
    <!-- 主区域 -->
    <main class="main">
      <div class="players-wrap">
        <div class="players-grid" id="players-grid"></div>
      </div>
      
      <div class="side-panel">
        <!-- 控制面板 -->
        <div class="control-panel">
          <div class="control-buttons">
            <button class="btn btn-primary" id="btn-start" onclick="game.startGame()">🎲 开始</button>
            <button class="btn btn-secondary" id="btn-pause" onclick="game.togglePause()" style="display:none;">⏸️ 暂停</button>
          </div>
          <div class="deck-info">
            <span>📦 剩余: <strong id="deck-remaining">0</strong></span>
            <span>🗑️ 弃牌: <strong id="discard-pile">0</strong></span>
          </div>
        </div>
        
        <!-- 日志 -->
        <div class="log-panel">
          <div class="log-header">📜 游戏日志</div>
          <div class="log-content" id="log-content"></div>
        </div>
      </div>
    </main>
    
    <!-- 底部 -->
    <footer class="footer">
      <span>v3.3.0 · 32 武将 · 108 卡牌 · </span>
      <span id="build-timestamp"></span>
    </footer>
  </div>
  
  <!-- 卡牌提示 -->
  <div class="card-tooltip" id="card-tooltip">
    <img class="card-tooltip-image" id="tooltip-image" src="" alt="">
    <div class="card-tooltip-name" id="tooltip-name"></div>
    <div class="card-tooltip-suit" id="tooltip-suit"></div>
    <div class="card-tooltip-desc" id="tooltip-desc"></div>
  </div>
  
  <script src="game.bundle.js"></script>
</body>
</html>
