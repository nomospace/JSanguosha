<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>三国杀 Mini</title>
  <style>
    :root {
      --bg-primary: #0d0d1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #252542;
      --border: #3d3d5c;
      --primary: #f39c12;
      --danger: #e74c3c;
      --success: #2ecc71;
      --info: #3498db;
      --wei: #5dade2;
      --shu: #2ecc71;
      --wu: #ec7063;
      --qun: #f4d03f;
      --text: #ecf0f1;
      --text-muted: #95a5a6;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      font-size: 14px;
    }
    
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(180deg, var(--bg-primary) 0%, #0a0a15 100%);
    }
    
    /* 顶部导航 */
    .header {
      background: var(--bg-secondary);
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .logo h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .deck-info {
      display: flex;
      gap: 10px;
      font-size: 11px;
    }
    
    .deck-stat {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      background: var(--bg-card);
      border-radius: 4px;
    }
    
    .deck-stat strong {
      color: var(--primary);
      font-size: 12px;
    }
    
    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
    }
    
    .status-waiting { background: var(--info); color: #fff; }
    .status-playing { background: var(--success); color: #fff; }
    .status-paused { background: var(--primary); color: #000; }
    .status-ended { background: var(--danger); color: #fff; }
    
    .settings-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }
    
    /* 主内容 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      overflow: hidden;
    }
    
    /* 回合信息 */
    .turn-bar {
      background: var(--bg-secondary);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .turn-info {
      color: var(--primary);
      font-weight: 600;
    }
    
    /* 玩家区域 */
    .players-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    /* 玩家卡片 */
    .player-card {
      background: var(--bg-card);
      border-radius: 10px;
      padding: 10px;
      border: 2px solid var(--border);
      transition: all 0.3s;
      position: relative;
      opacity: 0.9;
    }
    
    .player-card.active {
      border-color: var(--primary);
      opacity: 1;
      box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
    }
    
    .player-card.dying {
      animation: dying-blink 0.5s ease-in-out infinite;
      border-color: var(--danger);
    }
    
    @keyframes dying-blink {
      0%, 100% { box-shadow: 0 0 5px rgba(231, 76, 60, 0.5); }
      50% { box-shadow: 0 0 20px rgba(231, 76, 60, 0.8); }
    }
    
    .player-card.dead {
      opacity: 0.4;
      filter: grayscale(80%);
    }
    
    .player-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    
    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      border: 2px solid;
    }
    
    .kingdom-wei .player-avatar { background: var(--wei); border-color: var(--wei); }
    .kingdom-shu .player-avatar { background: var(--shu); border-color: var(--shu); }
    .kingdom-wu .player-avatar { background: var(--wu); border-color: var(--wu); }
    .kingdom-qun .player-avatar { background: var(--qun); border-color: var(--qun); }
    
    .player-info {
      flex: 1;
      min-width: 0;
    }
    
    .player-name-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .player-name {
      font-size: 13px;
      font-weight: 700;
    }
    
    .kingdom-tag {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 600;
    }
    
    .kingdom-wei .kingdom-tag { background: var(--wei); color: #fff; }
    .kingdom-shu .kingdom-tag { background: var(--shu); color: #fff; }
    .kingdom-wu .kingdom-tag { background: var(--wu); color: #fff; }
    .kingdom-qun .kingdom-tag { background: var(--qun); color: #000; }
    
    .player-skill {
      font-size: 9px;
      color: var(--primary);
      margin-top: 1px;
    }
    
    .hand-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: var(--primary);
      color: #000;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 8px;
      font-weight: 700;
    }
    
    /* 体力显示 */
    .hp-display {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 4px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .hp-number {
      color: var(--danger);
    }
    
    /* 状态图标 */
    .status-icons {
      display: flex;
      gap: 3px;
      margin-bottom: 4px;
      min-height: 16px;
    }
    
    .status-icon {
      font-size: 10px;
      padding: 1px 4px;
      background: rgba(231, 76, 60, 0.2);
      border-radius: 3px;
      color: var(--danger);
    }
    
    /* 装备栏 */
    .equipment-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 6px;
      min-height: 18px;
    }
    
    .equip-tag {
      font-size: 8px;
      padding: 1px 4px;
      background: var(--bg-secondary);
      border-radius: 3px;
      color: var(--text-muted);
    }
    
    /* 手牌区 */
    .hand-section {
      margin-top: 4px;
    }
    
    .hand-tabs {
      display: flex;
      gap: 3px;
      margin-bottom: 4px;
    }
    
    .hand-tab {
      font-size: 9px;
      padding: 2px 6px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      cursor: pointer;
    }
    
    .hand-tab.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
    }
    
    .hand-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    
    .mini-card {
      aspect-ratio: 2.5/3.5;
      border-radius: 4px;
      background: var(--card-color, var(--danger));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      position: relative;
    }
    
    .mini-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    
    .mini-card.disabled {
      opacity: 0.5;
    }
    
    .mini-card-suit {
      font-size: 14px;
      color: #fff;
    }
    
    .mini-card-name {
      font-size: 8px;
      color: #fff;
      font-weight: 500;
    }
    
    /* 快捷操作栏 */
    .quick-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    
    .quick-btn {
      flex: 1;
      padding: 6px 2px;
      font-size: 9px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      transition: transform 0.1s;
    }
    
    .quick-btn:active {
      transform: scale(0.95);
    }
    
    .quick-btn.sha { background: var(--danger); color: #fff; }
    .quick-btn.tao { background: var(--success); color: #fff; }
    .quick-btn.discard { background: var(--text-muted); color: #fff; }
    .quick-btn.end { background: var(--bg-secondary); color: var(--text); border: 1px solid var(--border); }
    .quick-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    /* 底部面板 */
    .bottom-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    
    .control-bar {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      gap: 6px;
    }
    
    .btn {
      flex: 1;
      padding: 10px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    .btn:active {
      transform: scale(0.96);
    }
    
    .btn-primary {
      background: var(--primary);
      color: #000;
    }
    
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    
    /* 日志面板 */
    .log-panel {
      background: var(--bg-secondary);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .log-header {
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }
    
    .log-header:hover {
      background: var(--bg-card);
    }
    
    .log-toggle {
      font-size: 10px;
    }
    
    .log-content {
      max-height: 60px;
      overflow-y: auto;
      padding: 6px 10px;
      font-size: 10px;
      font-family: monospace;
      transition: max-height 0.2s;
    }
    
    .log-content.expanded {
      max-height: 150px;
    }
    
    .log-entry {
      padding: 1px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .log-system { color: var(--primary); }
    .log-turn { color: var(--danger); font-weight: 600; }
    .log-phase { color: var(--info); }
    .log-draw { color: var(--success); }
    .log-play { color: #9b59b6; }
    .log-skill { color: var(--primary); }
    .log-death { color: var(--danger); font-weight: 600; }
    
    /* 卡牌详情弹窗 */
    .card-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 999;
      display: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .card-modal-overlay.show {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }
    
    .card-modal {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 16px;
      max-width: 280px;
      width: 90%;
      position: relative;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      transform: scale(0.9);
      transition: transform 0.2s;
    }
    
    .card-modal-overlay.show .card-modal {
      transform: scale(1);
    }
    
    .modal-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border: none;
      background: var(--bg-secondary);
      border-radius: 50%;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-close:hover {
      background: var(--danger);
      color: #fff;
    }
    
    .modal-card-image {
      width: 100%;
      height: 160px;
      object-fit: contain;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .modal-card-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .modal-card-suit {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .modal-card-desc {
      font-size: 12px;
      line-height: 1.6;
    }
    
    /* 设置面板 */
    .settings-panel {
      position: fixed;
      top: 0;
      right: -260px;
      width: 240px;
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      z-index: 100;
      transition: right 0.3s;
      padding: 16px;
    }
    
    .settings-panel.open {
      right: 0;
    }
    
    .settings-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--primary);
    }
    
    .settings-group {
      margin-bottom: 16px;
    }
    
    .settings-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    
    .theme-options {
      display: flex;
      gap: 6px;
    }
    
    .theme-btn {
      flex: 1;
      padding: 8px;
      font-size: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
    }
    
    .theme-btn.active {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    .settings-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      border: none;
      background: var(--bg-card);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
    }
    
    .settings-version {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
    }
    
    /* 底部 */
    .footer {
      text-align: center;
      padding: 4px;
      font-size: 9px;
      color: var(--text-muted);
    }
    
    /* 响应式 */
    @media (min-width: 600px) {
      .players-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      
      .player-card {
        padding: 12px;
      }
      
      .hand-cards {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    
    @media (min-width: 900px) {
      .app {
        max-width: 1000px;
        margin: 0 auto;
      }
      
      .main {
        flex-direction: row;
        padding: 10px;
        gap: 10px;
      }
      
      .players-grid {
        flex: 1;
      }
      
      .bottom-panel {
        width: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span>🦞</span>
        <h1>三国杀 Mini</h1>
      </div>
      <div class="header-right">
        <div class="deck-info">
          <span class="deck-stat">📦<strong id="deck-remaining">0</strong></span>
          <span class="deck-stat">🗑️<strong id="discard-pile">0</strong></span>
        </div>
        <span class="status-badge status-waiting" id="game-status">等待开始</span>
        <button class="settings-btn" onclick="game.toggleSettings()">⚙️</button>
      </div>
    </header>
    
    <main class="main">
      <div class="players-grid" id="players-grid"></div>
      
      <aside class="bottom-panel">
        <div class="turn-bar">
          <span class="turn-info" id="turn-display">准备开始</span>
        </div>
        
        <div class="control-bar">
          <button class="btn btn-primary" id="btn-start" onclick="game.startGame()">🎲 开始游戏</button>
          <button class="btn btn-secondary" id="btn-pause" onclick="game.togglePause()" style="display:none;">⏸️</button>
        </div>
        
        <div class="log-panel">
          <div class="log-header" onclick="game.toggleLog()">
            <span>📜 游戏日志</span>
            <span class="log-toggle" id="log-toggle">展开 ▼</span>
          </div>
          <div class="log-content" id="log-content"></div>
        </div>
      </aside>
    </main>
    
    <footer class="footer">© 2026 三国杀 Mini</footer>
  </div>
  
  <!-- 卡牌详情弹窗 -->
  <div class="card-modal-overlay" id="card-modal-overlay" onclick="game.closeModal(event)">
    <div class="card-modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="game.closeModal()">✕</button>
      <img class="modal-card-image" id="modal-image" src="" alt="">
      <div class="modal-card-name" id="modal-name"></div>
      <div class="modal-card-suit" id="modal-suit"></div>
      <div class="modal-card-desc" id="modal-desc"></div>
    </div>
  </div>
  
  <!-- 设置面板 -->
  <div class="settings-panel" id="settings-panel">
    <button class="settings-close" onclick="game.toggleSettings()">✕</button>
    <div class="settings-title">⚙️ 设置</div>
    <div class="settings-group">
      <div class="settings-label">主题模式</div>
      <div class="theme-options">
        <button class="theme-btn active" onclick="game.setTheme('dark')">深色</button>
        <button class="theme-btn" onclick="game.setTheme('light')">浅色</button>
        <button class="theme-btn" onclick="game.setTheme('eye-care')">护眼</button>
      </div>
    </div>
    <div class="settings-version">
      <p>v3.6.0 · 32武将 · 108卡牌</p>
      <p id="build-timestamp"></p>
    </div>
  </div>
  
  <script src="game.bundle.js"></script>
</body>
</html>
