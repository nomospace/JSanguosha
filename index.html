<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三国杀 Mini - 文字版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 顶部信息栏 */
    .header {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 2px solid #f39c12;
    }

    .header h1 {
      font-size: 28px;
      color: #f39c12;
    }

    .header-info {
      display: flex;
      gap: 20px;
      font-size: 16px;
    }

    .header-info span {
      color: #fff;
    }

    .status {
      font-weight: bold;
      padding: 5px 15px;
      border-radius: 5px;
      background: #2ecc71;
    }

    /* 游戏区域 */
    .game-area {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* 玩家区域 */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .player-card {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      padding: 15px;
      border: 3px solid transparent;
      transition: all 0.3s;
      position: relative;
    }

    .player-card.active {
      border-color: #f39c12;
      box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
    }

    .player-card.dead {
      opacity: 0.5;
      filter: grayscale(100%);
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .player-name {
      font-size: 18px;
      font-weight: bold;
    }

    .kingdom-wei { color: #3498db; }
    .kingdom-shu { color: #2ecc71; }
    .kingdom-wu { color: #e74c3c; }
    .kingdom-qun { color: #f39c12; }

    .player-skill {
      font-size: 12px;
      color: #f39c12;
      margin: 5px 0;
    }

    .player-hp {
      font-size: 20px;
      margin: 10px 0;
    }

    .player-cards {
      font-size: 14px;
      color: #95a5a6;
    }

    /* 手牌区域 */
    .hand-cards {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .mini-card {
      width: 40px;
      height: 55px;
      border-radius: 4px;
      border: 2px solid #fff;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
    }

    .mini-card:hover {
      transform: translateY(-10px);
      z-index: 100;
    }

    .mini-card .suit {
      font-size: 18px;
      text-align: center;
      line-height: 30px;
    }

    .mini-card .name {
      font-size: 10px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
    }

    /* 卡牌悬浮提示 */
    .card-tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.95);
      border: 2px solid #f39c12;
      border-radius: 10px;
      padding: 15px;
      max-width: 300px;
      z-index: 1000;
      pointer-events: none;
      display: none;
      box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
    }

    .card-tooltip.show {
      display: block;
    }

    .card-tooltip-image {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background: #1a1a2e;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .card-tooltip-name {
      font-size: 18px;
      font-weight: bold;
      color: #f39c12;
      margin-bottom: 5px;
    }

    .card-tooltip-suit {
      font-size: 14px;
      color: #95a5a6;
      margin-bottom: 8px;
    }

    .card-tooltip-desc {
      font-size: 13px;
      color: #fff;
      line-height: 1.5;
    }

    /* 控制面板 */
    .control-panel {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      padding: 20px;
      border: 2px solid #f39c12;
    }

    .control-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: #f39c12;
      color: #fff;
    }

    .btn-secondary {
      background: #e67e22;
      color: #fff;
    }

    .btn-danger {
      background: #95a5a6;
      color: #fff;
    }

    .deck-info {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .deck-info p {
      margin: 5px 0;
      font-size: 14px;
    }

    /* 游戏日志 */
    .game-log {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #f39c12;
      border-radius: 10px;
      padding: 15px;
      height: 400px;
      overflow-y: auto;
    }

    .game-log h3 {
      color: #f39c12;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .log-entry {
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .log-system { color: #f39c12; }
    .log-turn { color: #e74c3c; }
    .log-phase { color: #3498db; }
    .log-draw { color: #2ecc71; }
    .log-play { color: #9b59b6; }
    .log-skill { color: #e67e22; }
    .log-heal { color: #2ecc71; }
    .log-death { color: #95a5a6; }
    .log-normal { color: #fff; }

    /* 底部信息 */
    .footer {
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      color: #666;
      font-size: 14px;
    }

    .footer a {
      color: #f39c12;
      text-decoration: none;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .game-area {
        grid-template-columns: 1fr;
      }

      .players-grid {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部信息栏 -->
    <div class="header">
      <h1>🦞 三国杀 Mini</h1>
      <div class="header-info">
        <span id="turn-display">准备开始</span>
        <span class="status" id="game-status">等待开始</span>
        <span id="deck-count">牌堆：0</span>
        <span id="discard-count">弃牌：0</span>
      </div>
    </div>

    <!-- 游戏主区域 -->
    <div class="game-area">
      <!-- 玩家区域 -->
      <div class="players-grid" id="players-grid"></div>

      <!-- 控制面板 -->
      <div class="control-panel">
        <div class="control-buttons">
          <button class="btn btn-primary" id="btn-start" onclick="game.startGame()">🎲 开始游戏</button>
          <button class="btn btn-secondary" id="btn-pause" onclick="game.togglePause()" style="display:none;">⏸️ 暂停</button>
          <button class="btn btn-danger" onclick="game.backToMenu()">↩️ 返回</button>
        </div>

        <div class="deck-info">
          <p>📦 牌堆剩余：<strong id="deck-remaining">0</strong></p>
          <p>🗑️ 弃牌堆：<strong id="discard-pile">0</strong></p>
        </div>
      </div>
    </div>

    <!-- 游戏日志 -->
    <div class="game-log">
      <h3>📜 游戏日志</h3>
      <div id="log-content"></div>
    </div>

    <!-- 底部信息 -->
    <div class="footer">
      <p>文字版 | 单机 AI 对战 | v3.1.0 | 标准包 32 武将 +108 卡牌</p>
      <p>🦞 Created by 金大虾</p>
      <p id="build-timestamp" style="color: #f39c12; margin-top: 8px; font-size: 12px;"></p>
    </div>
  </div>

  <!-- 卡牌悬浮提示 -->
  <div class="card-tooltip" id="card-tooltip">
    <img class="card-tooltip-image" id="tooltip-image" src="" alt="卡牌">
    <div class="card-tooltip-name" id="tooltip-name"></div>
    <div class="card-tooltip-suit" id="tooltip-suit"></div>
    <div class="card-tooltip-desc" id="tooltip-desc"></div>
  </div>

  <script src="game.bundle.js"></script>
</body>
</html>
